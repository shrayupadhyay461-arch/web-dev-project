<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post a Skill – FreelancerGo</title>
  <link rel="stylesheet" href="css/style.css">
 <link rel="stylesheet" href="css/animation.css">
</head>
<body>

  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>
  <div class="bg-particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <nav class="navbar">
    <div class="logo">🚀 FreelancerGo</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="post-skill.html">Post a Skill</a></li>
      <li><a href="favorites.html">Favorites</a></li>
    </ul>
  </nav>

  <section class="form-section">
    <div class="form-card floating">
      <h2>Post Your Skill</h2>
      <p class="form-subtitle">Fill in the details and start getting hired</p>
      <form id="post-skill-form">

        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" placeholder="e.g. Rahul Sharma" />
          <span class="error-msg" id="name-error"></span>
        </div>

        <div class="form-group">
          <label for="skill-title">Skill Title</label>
          <input type="text" id="skill-title" placeholder="e.g. I will design a logo for you" />
          <span class="error-msg" id="title-error"></span>
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category">
            <option value="">-- Select a category --</option>
            <option value="design">Design</option>
            <option value="coding">Coding</option>
            <option value="writing">Writing</option>
            <option value="marketing">Marketing</option>
            <option value="video">Video</option>
          </select>
          <span class="error-msg" id="category-error"></span>
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" rows="4" placeholder="Describe what you offer..."></textarea>
          <span class="error-msg" id="desc-error"></span>
        </div>

        <div class="form-group">
          <label for="price">Price (₹)</label>
          <input type="number" id="price" placeholder="e.g. 500" min="1" />
          <span class="error-msg" id="price-error"></span>
        </div>

        <button type="submit" class="btn submit-btn">Post Skill 🚀</button>

      </form>
    </div>
  </section>

  <footer class="footer">
    <p>Made by Shray Upadhyay &amp; Sanskar Patil · Rishihood University 2026</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
